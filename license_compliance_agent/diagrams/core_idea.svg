<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="450" fill="#f0fdf4" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#166534" font-size="20" font-weight="bold">✅ Core Idea — Detect Early, Decide Fast, Comply by Design</text>

  <!-- Five pillars -->
  <!-- Pillar 1: Detect -->
  <rect x="40" y="70" width="150" height="180" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="115" y="100" text-anchor="middle" fill="#065f46" font-size="32">👁️</text>
  <text x="115" y="130" text-anchor="middle" fill="#065f46" font-size="14" font-weight="bold">DETECT</text>
  <text x="115" y="155" text-anchor="middle" fill="#065f46" font-size="11">Watch dependency</text>
  <text x="115" y="170" text-anchor="middle" fill="#065f46" font-size="11">files in real-time</text>
  <text x="115" y="195" text-anchor="middle" fill="#065f46" font-size="10">package.json</text>
  <text x="115" y="210" text-anchor="middle" fill="#065f46" font-size="10">pom.xml</text>
  <text x="115" y="225" text-anchor="middle" fill="#065f46" font-size="10">requirements.txt</text>

  <!-- Arrow 1 -->
  <polygon points="200,155 220,145 220,150 250,150 250,160 220,160 220,165" fill="#059669"/>

  <!-- Pillar 2: Resolve -->
  <rect x="220" y="70" width="150" height="180" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="295" y="100" text-anchor="middle" fill="#5b21b6" font-size="32">🔍</text>
  <text x="295" y="130" text-anchor="middle" fill="#5b21b6" font-size="14" font-weight="bold">RESOLVE</text>
  <text x="295" y="155" text-anchor="middle" fill="#5b21b6" font-size="11">Query license</text>
  <text x="295" y="170" text-anchor="middle" fill="#5b21b6" font-size="11">data source</text>
  <text x="295" y="195" text-anchor="middle" fill="#5b21b6" font-size="10">SW360 API</text>
  <text x="295" y="210" text-anchor="middle" fill="#5b21b6" font-size="10">FOSSology API</text>
  <text x="295" y="225" text-anchor="middle" fill="#5b21b6" font-size="10">(or mock)</text>

  <!-- Arrow 2 -->
  <polygon points="380,155 400,145 400,150 430,150 430,160 400,160 400,165" fill="#7c3aed"/>

  <!-- Pillar 3: Classify -->
  <rect x="400" y="70" width="150" height="180" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="475" y="100" text-anchor="middle" fill="#991b1b" font-size="32">🧠</text>
  <text x="475" y="130" text-anchor="middle" fill="#991b1b" font-size="14" font-weight="bold">CLASSIFY</text>
  <text x="475" y="155" text-anchor="middle" fill="#991b1b" font-size="11">AI maps license</text>
  <text x="475" y="170" text-anchor="middle" fill="#991b1b" font-size="11">to obligations</text>
  <text x="475" y="195" text-anchor="middle" fill="#991b1b" font-size="10">🔴 Must fulfill</text>
  <text x="475" y="210" text-anchor="middle" fill="#991b1b" font-size="10">🟡 Must decide</text>
  <text x="475" y="225" text-anchor="middle" fill="#991b1b" font-size="10">🔵 Awareness</text>

  <!-- Arrow 3 -->
  <polygon points="560,155 580,145 580,150 610,150 610,160 580,160 580,165" fill="#dc2626"/>

  <!-- Pillar 4: Guide -->
  <rect x="580" y="70" width="150" height="180" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="655" y="100" text-anchor="middle" fill="#9a3412" font-size="32">📝</text>
  <text x="655" y="130" text-anchor="middle" fill="#9a3412" font-size="14" font-weight="bold">GUIDE</text>
  <text x="655" y="155" text-anchor="middle" fill="#9a3412" font-size="11">Generate checklist</text>
  <text x="655" y="170" text-anchor="middle" fill="#9a3412" font-size="11">show in IDE</text>
  <text x="655" y="195" text-anchor="middle" fill="#9a3412" font-size="10">COMPLIANCE_CHECKLIST.md</text>
  <text x="655" y="210" text-anchor="middle" fill="#9a3412" font-size="10">VS Code panel</text>
  <text x="655" y="225" text-anchor="middle" fill="#9a3412" font-size="10">Notifications</text>

  <!-- Arrow 4 -->
  <polygon points="740,155 760,145 760,150 790,150 790,160 760,160 760,165" fill="#ea580c"/>

  <!-- Pillar 5: Enforce -->
  <rect x="760" y="70" width="100" height="180" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="810" y="100" text-anchor="middle" fill="#075985" font-size="32">🚦</text>
  <text x="810" y="130" text-anchor="middle" fill="#075985" font-size="14" font-weight="bold">ENFORCE</text>
  <text x="810" y="155" text-anchor="middle" fill="#075985" font-size="11">Block until</text>
  <text x="810" y="170" text-anchor="middle" fill="#075985" font-size="11">resolved</text>
  <text x="810" y="195" text-anchor="middle" fill="#075985" font-size="10">Commit hook</text>
  <text x="810" y="210" text-anchor="middle" fill="#075985" font-size="10">Build gate</text>
  <text x="810" y="225" text-anchor="middle" fill="#075985" font-size="10">Escalation</text>

  <!-- Three-tier classification legend -->
  <rect x="60" y="280" width="780" height="150" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="450" y="305" text-anchor="middle" fill="#854d0e" font-size="14" font-weight="bold">Three-Tier Classification System</text>

  <!-- Tier 1: Obligation -->
  <rect x="80" y="320" width="230" height="95" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="195" y="345" text-anchor="middle" fill="#991b1b" font-size="20">🔴</text>
  <text x="195" y="365" text-anchor="middle" fill="#991b1b" font-size="13" font-weight="bold">Obligation</text>
  <text x="195" y="385" text-anchor="middle" fill="#7f1d1d" font-size="10">Required by license text</text>
  <text x="195" y="400" text-anchor="middle" fill="#7f1d1d" font-size="10" font-weight="bold">Agent: HARD BLOCK</text>

  <!-- Tier 2: Advisory -->
  <rect x="335" y="320" width="230" height="95" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="450" y="345" text-anchor="middle" fill="#854d0e" font-size="20">🟡</text>
  <text x="450" y="365" text-anchor="middle" fill="#854d0e" font-size="13" font-weight="bold">Advisory</text>
  <text x="450" y="385" text-anchor="middle" fill="#854d0e" font-size="10">Real exposure if ignored</text>
  <text x="450" y="400" text-anchor="middle" fill="#854d0e" font-size="10" font-weight="bold">Agent: SOFT GATE (decide)</text>

  <!-- Tier 3: Informational -->
  <rect x="590" y="320" width="230" height="95" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="705" y="345" text-anchor="middle" fill="#075985" font-size="20">🔵</text>
  <text x="705" y="365" text-anchor="middle" fill="#075985" font-size="13" font-weight="bold">Informational</text>
  <text x="705" y="385" text-anchor="middle" fill="#075985" font-size="10">Background context only</text>
  <text x="705" y="400" text-anchor="middle" fill="#075985" font-size="10" font-weight="bold">Agent: DISPLAY ONLY</text>
</svg>
