<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="420" fill="#f8fafc" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="bold">🔧 What the Agent Does — Block View</text>

  <!-- Block 1: Watcher -->
  <rect x="40" y="70" width="130" height="120" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="105" y="95" text-anchor="middle" fill="#065f46" font-size="28">👁️</text>
  <text x="105" y="120" text-anchor="middle" fill="#065f46" font-size="13" font-weight="bold">Watcher</text>
  <text x="105" y="140" text-anchor="middle" fill="#065f46" font-size="9">Monitors dep files</text>
  <text x="105" y="155" text-anchor="middle" fill="#065f46" font-size="9">package.json</text>
  <text x="105" y="170" text-anchor="middle" fill="#065f46" font-size="9">pom.xml</text>
  <text x="105" y="185" text-anchor="middle" fill="#065f46" font-size="9">requirements.txt</text>

  <!-- Arrow -->
  <polygon points="180,125 200,115 200,120 230,120 230,130 200,130 200,135" fill="#059669"/>

  <!-- Block 2: Resolver -->
  <rect x="200" y="70" width="130" height="120" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="265" y="95" text-anchor="middle" fill="#5b21b6" font-size="28">🔍</text>
  <text x="265" y="120" text-anchor="middle" fill="#5b21b6" font-size="13" font-weight="bold">Resolver</text>
  <text x="265" y="140" text-anchor="middle" fill="#5b21b6" font-size="9">Queries SW360</text>
  <text x="265" y="155" text-anchor="middle" fill="#5b21b6" font-size="9">or FOSSology</text>
  <text x="265" y="170" text-anchor="middle" fill="#5b21b6" font-size="9">for license data</text>
  <text x="265" y="185" text-anchor="middle" fill="#7c3aed" font-size="9" font-weight="bold">MIT, GPL-3.0...</text>

  <!-- Arrow -->
  <polygon points="340,125 360,115 360,120 390,120 390,130 360,130 360,135" fill="#7c3aed"/>

  <!-- Block 3: Classifier -->
  <rect x="360" y="70" width="130" height="120" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="425" y="95" text-anchor="middle" fill="#991b1b" font-size="28">🧠</text>
  <text x="425" y="120" text-anchor="middle" fill="#991b1b" font-size="13" font-weight="bold">Classifier</text>
  <text x="425" y="140" text-anchor="middle" fill="#991b1b" font-size="9">AI maps license</text>
  <text x="425" y="155" text-anchor="middle" fill="#991b1b" font-size="9">to ODs (1-12)</text>
  <text x="425" y="170" text-anchor="middle" fill="#991b1b" font-size="9">Assigns tier:</text>
  <text x="425" y="185" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="bold">🔴 🟡 🔵</text>

  <!-- Arrow -->
  <polygon points="500,125 520,115 520,120 550,120 550,130 520,130 520,135" fill="#dc2626"/>

  <!-- Block 4: Generator -->
  <rect x="520" y="70" width="130" height="120" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="585" y="95" text-anchor="middle" fill="#9a3412" font-size="28">📝</text>
  <text x="585" y="120" text-anchor="middle" fill="#9a3412" font-size="13" font-weight="bold">Generator</text>
  <text x="585" y="140" text-anchor="middle" fill="#9a3412" font-size="9">Creates checklist</text>
  <text x="585" y="155" text-anchor="middle" fill="#9a3412" font-size="9">COMPLIANCE_</text>
  <text x="585" y="170" text-anchor="middle" fill="#9a3412" font-size="9">CHECKLIST.md</text>
  <text x="585" y="185" text-anchor="middle" fill="#ea580c" font-size="9" font-weight="bold">[ ] ToDo items</text>

  <!-- Arrow -->
  <polygon points="660,125 680,115 680,120 710,120 710,130 680,130 680,135" fill="#ea580c"/>

  <!-- Block 5: Enforcer -->
  <rect x="680" y="70" width="180" height="120" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="770" y="95" text-anchor="middle" fill="#075985" font-size="28">🚦</text>
  <text x="770" y="120" text-anchor="middle" fill="#075985" font-size="13" font-weight="bold">Enforcer</text>
  <text x="770" y="140" text-anchor="middle" fill="#075985" font-size="9">Pre-commit hook</text>
  <text x="770" y="155" text-anchor="middle" fill="#075985" font-size="9">Build gate</text>
  <text x="770" y="170" text-anchor="middle" fill="#075985" font-size="9">Blocks if 🔴 incomplete</text>
  <text x="770" y="185" text-anchor="middle" fill="#0284c7" font-size="9" font-weight="bold">or 🟡 undecided</text>

  <!-- OD Catalog Box -->
  <rect x="340" y="210" width="180" height="90" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="430" y="235" text-anchor="middle" fill="#854d0e" font-size="12" font-weight="bold">📚 OD Catalog</text>
  <text x="430" y="255" text-anchor="middle" fill="#854d0e" font-size="9">OD-01 Internal Use</text>
  <text x="430" y="270" text-anchor="middle" fill="#854d0e" font-size="9">OD-02 Modification</text>
  <text x="430" y="285" text-anchor="middle" fill="#854d0e" font-size="9">... OD-12 Compatibility</text>
  
  <!-- Arrow from catalog to classifier -->
  <line x1="430" y1="210" x2="425" y2="190" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="420,193 425,185 430,193" fill="#ca8a04"/>

  <!-- LLM Box -->
  <rect x="540" y="210" width="120" height="70" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="600" y="235" text-anchor="middle" fill="#991b1b" font-size="12" font-weight="bold">🤖 LLM</text>
  <text x="600" y="255" text-anchor="middle" fill="#991b1b" font-size="9">GPT-4o</text>
  <text x="600" y="270" text-anchor="middle" fill="#991b1b" font-size="9">Interprets + classifies</text>
  
  <!-- Arrow from LLM to classifier -->
  <line x1="560" y1="210" x2="440" y2="190" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Three-Tier Legend -->
  <rect x="40" y="320" width="820" height="85" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="450" y="345" text-anchor="middle" fill="#475569" font-size="14" font-weight="bold">Three-Tier Classification Output</text>
  
  <!-- Tier boxes -->
  <rect x="60" y="355" width="240" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="180" y="380" text-anchor="middle" fill="#991b1b" font-size="11">🔴 <tspan font-weight="bold">Obligation</tspan> — HARD BLOCK</text>

  <rect x="330" y="355" width="240" height="40" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1"/>
  <text x="450" y="380" text-anchor="middle" fill="#854d0e" font-size="11">🟡 <tspan font-weight="bold">Advisory</tspan> — SOFT GATE</text>

  <rect x="600" y="355" width="240" height="40" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="720" y="380" text-anchor="middle" fill="#075985" font-size="11">🔵 <tspan font-weight="bold">Informational</tspan> — DISPLAY</text>
</svg>
