<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="480" fill="#f8fafc" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="bold">🏁 Hackathon Scope</text>

  <!-- In Scope Section -->
  <rect x="40" y="55" width="400" height="360" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="240" y="85" text-anchor="middle" fill="#065f46" font-size="16" font-weight="bold">✅ IN SCOPE (Hackathon)</text>

  <!-- Goal 1 -->
  <rect x="55" y="100" width="370" height="45" rx="6" fill="#bbf7d0" stroke="#059669" stroke-width="1"/>
  <text x="70" y="120" fill="#065f46" font-size="11" font-weight="bold">1. VS Code Extension — Dependency Watcher</text>
  <text x="70" y="137" fill="#065f46" font-size="10">Monitor package.json, pom.xml, requirements.txt</text>

  <!-- Goal 2 -->
  <rect x="55" y="150" width="370" height="45" rx="6" fill="#bbf7d0" stroke="#059669" stroke-width="1"/>
  <text x="70" y="170" fill="#065f46" font-size="11" font-weight="bold">2. License Resolver</text>
  <text x="70" y="187" fill="#065f46" font-size="10">Query mock SW360/FOSSology data source</text>

  <!-- Goal 3 -->
  <rect x="55" y="200" width="370" height="45" rx="6" fill="#bbf7d0" stroke="#059669" stroke-width="1"/>
  <text x="70" y="220" fill="#065f46" font-size="11" font-weight="bold">3. AI Classifier</text>
  <text x="70" y="237" fill="#065f46" font-size="10">Map license → OD catalog → 🔴🟡🔵 tiers</text>

  <!-- Goal 4 -->
  <rect x="55" y="250" width="370" height="45" rx="6" fill="#bbf7d0" stroke="#059669" stroke-width="1"/>
  <text x="70" y="270" fill="#065f46" font-size="11" font-weight="bold">4. Checklist Generator</text>
  <text x="70" y="287" fill="#065f46" font-size="10">Generate COMPLIANCE_CHECKLIST.md with items</text>

  <!-- Goal 5 -->
  <rect x="55" y="300" width="370" height="45" rx="6" fill="#bbf7d0" stroke="#059669" stroke-width="1"/>
  <text x="70" y="320" fill="#065f46" font-size="11" font-weight="bold">5. Commit Hook Enforcement</text>
  <text x="70" y="337" fill="#065f46" font-size="10">Block commit when 🔴 items incomplete</text>

  <!-- Goal 6 -->
  <rect x="55" y="350" width="370" height="55" rx="6" fill="#bbf7d0" stroke="#059669" stroke-width="1"/>
  <text x="70" y="370" fill="#065f46" font-size="11" font-weight="bold">6. Demo: Add GPL-3.0 Dependency</text>
  <text x="70" y="387" fill="#065f46" font-size="10">Show flow: detect → classify → checklist → block</text>
  <text x="70" y="400" fill="#059669" font-size="9">End-to-end demonstration of core value</text>

  <!-- Out of Scope Section -->
  <rect x="460" y="55" width="400" height="360" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="660" y="85" text-anchor="middle" fill="#991b1b" font-size="16" font-weight="bold">❌ OUT OF SCOPE (Post-Hackathon)</text>

  <!-- Out 1 -->
  <rect x="475" y="100" width="370" height="40" rx="6" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="490" y="118" fill="#991b1b" font-size="11" font-weight="bold">Production SW360/FOSSology Integration</text>
  <text x="490" y="133" fill="#7f1d1d" font-size="10">Mock data source acceptable for demo</text>

  <!-- Out 2 -->
  <rect x="475" y="145" width="370" height="40" rx="6" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="490" y="163" fill="#991b1b" font-size="11" font-weight="bold">Complete OD Coverage (all 12 dimensions)</text>
  <text x="490" y="178" fill="#7f1d1d" font-size="10">Subset for demo (e.g., OD-03, OD-04, OD-10)</text>

  <!-- Out 3 -->
  <rect x="475" y="190" width="370" height="40" rx="6" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="490" y="208" fill="#991b1b" font-size="11" font-weight="bold">Build Pipeline Integration (CI/CD gate)</text>
  <text x="490" y="223" fill="#7f1d1d" font-size="10">Commit hook sufficient for demonstration</text>

  <!-- Out 4 -->
  <rect x="475" y="235" width="370" height="40" rx="6" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="490" y="253" fill="#991b1b" font-size="11" font-weight="bold">Multi-Language Support</text>
  <text x="490" y="268" fill="#7f1d1d" font-size="10">2-3 package managers for demo (npm, mvn, pip)</text>

  <!-- Out 5 -->
  <rect x="475" y="280" width="370" height="40" rx="6" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="490" y="298" fill="#991b1b" font-size="11" font-weight="bold">Alternative Package Suggestions</text>
  <text x="490" y="313" fill="#7f1d1d" font-size="10">Suggest compatible replacement packages</text>

  <!-- Out 6 -->
  <rect x="475" y="325" width="370" height="40" rx="6" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="490" y="343" fill="#991b1b" font-size="11" font-weight="bold">Escalation Workflow</text>
  <text x="490" y="358" fill="#7f1d1d" font-size="10">Route unresolvable items to legal/compliance</text>

  <!-- Out 7 -->
  <rect x="475" y="370" width="370" height="35" rx="6" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="490" y="393" fill="#991b1b" font-size="11" font-weight="bold">Caching / Offline Mode</text>

  <!-- Bottom summary -->
  <rect x="40" y="425" width="820" height="45" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="450" y="448" text-anchor="middle" fill="#854d0e" font-size="13" font-weight="bold">Goal: Validate core concept end-to-end in hackathon timeframe</text>
  <text x="450" y="463" text-anchor="middle" fill="#92400e" font-size="11">Add dependency → Agent detects → AI classifies → Checklist generated → Commit blocked</text>
</svg>
