<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="500" fill="#f8fafc" rx="12"/>

  <!-- Center node -->
  <rect x="320" y="210" width="260" height="60" rx="30" fill="#2563eb" stroke="#1d4ed8" stroke-width="2"/>
  <text x="450" y="247" text-anchor="middle" fill="white" font-size="16" font-weight="bold">LicenseLens AI</text>

  <!-- Branch 1: Detect -->
  <line x1="320" y1="230" x2="140" y2="100" stroke="#059669" stroke-width="2"/>
  <rect x="40" y="75" width="200" height="50" rx="25" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="140" y="105" text-anchor="middle" fill="#065f46" font-size="13" font-weight="bold">👁️ Detect</text>
  <text x="140" y="145" text-anchor="middle" fill="#065f46" font-size="11">Watch dependency files</text>

  <!-- Branch 2: Resolve -->
  <line x1="320" y1="250" x2="120" y2="330" stroke="#7c3aed" stroke-width="2"/>
  <rect x="20" y="305" width="200" height="50" rx="25" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="120" y="335" text-anchor="middle" fill="#5b21b6" font-size="13" font-weight="bold">🔍 Resolve</text>
  <text x="120" y="375" text-anchor="middle" fill="#5b21b6" font-size="11">Query SW360/FOSSology</text>

  <!-- Branch 3: Classify -->
  <line x1="450" y1="210" x2="450" y2="80" stroke="#dc2626" stroke-width="2"/>
  <rect x="350" y="40" width="200" height="50" rx="25" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="450" y="70" text-anchor="middle" fill="#991b1b" font-size="13" font-weight="bold">🧠 Classify</text>
  <text x="450" y="20" text-anchor="middle" fill="#991b1b" font-size="11">AI → 🔴🟡🔵 Tiers</text>

  <!-- Branch 4: Guide -->
  <line x1="580" y1="230" x2="760" y2="100" stroke="#ea580c" stroke-width="2"/>
  <rect x="660" y="75" width="200" height="50" rx="25" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
  <text x="760" y="105" text-anchor="middle" fill="#9a3412" font-size="13" font-weight="bold">📝 Guide</text>
  <text x="760" y="145" text-anchor="middle" fill="#9a3412" font-size="11">Checklist + IDE Panel</text>

  <!-- Branch 5: Enforce -->
  <line x1="580" y1="250" x2="760" y2="330" stroke="#0284c7" stroke-width="2"/>
  <rect x="660" y="305" width="200" height="50" rx="25" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="760" y="335" text-anchor="middle" fill="#075985" font-size="13" font-weight="bold">🚦 Enforce</text>
  <text x="760" y="375" text-anchor="middle" fill="#075985" font-size="11">Commit + Build Gates</text>

  <!-- Branch 6: Tagline -->
  <line x1="450" y1="270" x2="450" y2="400" stroke="#ca8a04" stroke-width="2"/>
  <rect x="300" y="390" width="300" height="50" rx="25" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="450" y="420" text-anchor="middle" fill="#854d0e" font-size="13" font-weight="bold">Detect Early, Decide Fast, Comply by Design</text>
</svg>
