<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#fef2f2" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#991b1b" font-size="20" font-weight="bold">❌ The Problem — Late, Manual, Inconsistent Compliance</text>

  <!-- Pain Point 1 -->
  <rect x="40" y="70" width="250" height="90" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="165" y="95" text-anchor="middle" fill="#991b1b" font-size="14" font-weight="bold">⏰ Late Detection</text>
  <text x="165" y="115" text-anchor="middle" fill="#7f1d1d" font-size="11">Compliance scan runs weeks</text>
  <text x="165" y="130" text-anchor="middle" fill="#7f1d1d" font-size="11">after dependencies are added</text>
  <text x="165" y="150" text-anchor="middle" fill="#7f1d1d" font-size="11">Context lost, rework required</text>

  <!-- Pain Point 2 -->
  <rect x="325" y="70" width="250" height="90" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="450" y="95" text-anchor="middle" fill="#991b1b" font-size="14" font-weight="bold">📋 Manual Translation</text>
  <text x="450" y="115" text-anchor="middle" fill="#7f1d1d" font-size="11">Legal findings must be manually</text>
  <text x="450" y="130" text-anchor="middle" fill="#7f1d1d" font-size="11">converted to developer actions</text>
  <text x="450" y="150" text-anchor="middle" fill="#7f1d1d" font-size="11">Inconsistent interpretation</text>

  <!-- Pain Point 3 -->
  <rect x="610" y="70" width="250" height="90" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="735" y="95" text-anchor="middle" fill="#991b1b" font-size="14" font-weight="bold">🚫 No Enforcement</text>
  <text x="735" y="115" text-anchor="middle" fill="#7f1d1d" font-size="11">Non-compliant code can be</text>
  <text x="735" y="130" text-anchor="middle" fill="#7f1d1d" font-size="11">committed and built freely</text>
  <text x="735" y="150" text-anchor="middle" fill="#7f1d1d" font-size="11">Hope nothing is missed</text>

  <!-- Pain Point 4 -->
  <rect x="40" y="180" width="250" height="90" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="165" y="205" text-anchor="middle" fill="#991b1b" font-size="14" font-weight="bold">🧠 Tribal Knowledge</text>
  <text x="165" y="225" text-anchor="middle" fill="#7f1d1d" font-size="11">Only experienced engineers</text>
  <text x="165" y="240" text-anchor="middle" fill="#7f1d1d" font-size="11">know which licenses are risky</text>
  <text x="165" y="260" text-anchor="middle" fill="#7f1d1d" font-size="11">New devs learn by mistakes</text>

  <!-- Pain Point 5 -->
  <rect x="325" y="180" width="250" height="90" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="450" y="205" text-anchor="middle" fill="#991b1b" font-size="14" font-weight="bold">⚖️ Legal Bottleneck</text>
  <text x="450" y="225" text-anchor="middle" fill="#7f1d1d" font-size="11">Edge cases escalate to legal</text>
  <text x="450" y="240" text-anchor="middle" fill="#7f1d1d" font-size="11">Creating delays and backlog</text>
  <text x="450" y="260" text-anchor="middle" fill="#7f1d1d" font-size="11">Blocks release progress</text>

  <!-- Pain Point 6 -->
  <rect x="610" y="180" width="250" height="90" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="735" y="205" text-anchor="middle" fill="#991b1b" font-size="14" font-weight="bold">📊 Spreadsheet Chaos</text>
  <text x="735" y="225" text-anchor="middle" fill="#7f1d1d" font-size="11">Checklists in Excel/SharePoint</text>
  <text x="735" y="240" text-anchor="middle" fill="#7f1d1d" font-size="11">Not version-controlled</text>
  <text x="735" y="260" text-anchor="middle" fill="#7f1d1d" font-size="11">Frequently outdated</text>

  <!-- Timeline showing late discovery -->
  <rect x="60" y="310" width="780" height="100" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="335" text-anchor="middle" fill="#92400e" font-size="14" font-weight="bold">Timeline: When Compliance Issues Are Discovered</text>
  
  <!-- Timeline line -->
  <line x1="100" y1="375" x2="800" y2="375" stroke="#92400e" stroke-width="3"/>
  
  <!-- Week markers -->
  <circle cx="150" cy="375" r="8" fill="#059669"/>
  <text x="150" y="360" text-anchor="middle" fill="#065f46" font-size="10">Week 1</text>
  <text x="150" y="395" text-anchor="middle" fill="#065f46" font-size="9">Add dep</text>
  
  <circle cx="350" cy="375" r="8" fill="#6b7280"/>
  <text x="350" y="360" text-anchor="middle" fill="#374151" font-size="10">Week 2-3</text>
  <text x="350" y="395" text-anchor="middle" fill="#374151" font-size="9">Coding...</text>
  
  <circle cx="550" cy="375" r="8" fill="#6b7280"/>
  <text x="550" y="360" text-anchor="middle" fill="#374151" font-size="10">Week 4</text>
  <text x="550" y="395" text-anchor="middle" fill="#374151" font-size="9">More coding...</text>
  
  <circle cx="750" cy="375" r="8" fill="#dc2626"/>
  <text x="750" y="360" text-anchor="middle" fill="#991b1b" font-size="10" font-weight="bold">Week 5+</text>
  <text x="750" y="395" text-anchor="middle" fill="#991b1b" font-size="9" font-weight="bold">SCAN! 😱</text>

  <!-- Bottom stats -->
  <rect x="60" y="430" width="240" height="70" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="180" y="455" text-anchor="middle" fill="#991b1b" font-size="12" font-weight="bold">200-500 dependencies</text>
  <text x="180" y="475" text-anchor="middle" fill="#7f1d1d" font-size="11">per typical Siemens product</text>
  <text x="180" y="492" text-anchor="middle" fill="#7f1d1d" font-size="11">Manual review unsustainable</text>

  <rect x="330" y="430" width="240" height="70" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="450" y="455" text-anchor="middle" fill="#991b1b" font-size="12" font-weight="bold">2-3 rework cycles</text>
  <text x="450" y="475" text-anchor="middle" fill="#7f1d1d" font-size="11">per release when issues</text>
  <text x="450" y="492" text-anchor="middle" fill="#7f1d1d" font-size="11">are discovered late</text>

  <rect x="600" y="430" width="240" height="70" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="720" y="455" text-anchor="middle" fill="#991b1b" font-size="12" font-weight="bold">Weeks of delay</text>
  <text x="720" y="475" text-anchor="middle" fill="#7f1d1d" font-size="11">when compliance blocks</text>
  <text x="720" y="492" text-anchor="middle" fill="#7f1d1d" font-size="11">release at the last moment</text>
</svg>
