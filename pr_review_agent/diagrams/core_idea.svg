<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="Arial, sans-serif">
  <rect width="800" height="320" fill="#f0fdf4" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#166534">Core Idea: Agent Catches Patterns, Reviewer Thinks About Logic</text>

  <!-- Left: PR -->
  <rect x="30" y="100" width="150" height="80" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="105" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8">📝 PR Pushed</text>
  <text x="105" y="152" text-anchor="middle" font-size="10" fill="#1e40af">New code changes</text>
  <text x="105" y="168" text-anchor="middle" font-size="10" fill="#1e40af">arrive for review</text>

  <!-- Arrow -->
  <path d="M 180 140 L 220 140" stroke="#64748b" stroke-width="2" marker-end="url(#ca1)"/>
  <defs><marker id="ca1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#64748b"/></marker></defs>

  <!-- Agent box -->
  <rect x="220" y="70" width="240" height="180" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
  <text x="340" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#7c3aed">🤖 Review Agent</text>

  <rect x="240" y="110" width="200" height="28" rx="5" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="340" y="129" text-anchor="middle" font-size="10" fill="#991b1b">Layer 1: Lint rules (instant, $0)</text>

  <rect x="240" y="145" width="200" height="28" rx="5" fill="#d1fae5" stroke="#86efac"/>
  <text x="340" y="164" text-anchor="middle" font-size="10" fill="#065f46">Layer 2: RAG review (contextual)</text>

  <rect x="240" y="185" width="200" height="28" rx="5" fill="#ffedd5" stroke="#fdba74"/>
  <text x="340" y="204" text-anchor="middle" font-size="10" fill="#9a3412">Post: inline comments + fixes</text>

  <text x="340" y="238" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c3aed">&lt; 60 seconds total</text>

  <!-- Arrow to human -->
  <path d="M 460 140 L 510 140" stroke="#64748b" stroke-width="2" marker-end="url(#ca1)"/>

  <!-- Human reviewer -->
  <rect x="510" y="80" width="250" height="160" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="635" y="110" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">👤 Human Reviewer</text>
  <text x="635" y="140" text-anchor="middle" font-size="11" fill="#065f46">Only focuses on:</text>
  <text x="635" y="162" text-anchor="middle" font-size="11" fill="#065f46">✅ Business logic correctness</text>
  <text x="635" y="180" text-anchor="middle" font-size="11" fill="#065f46">✅ Architecture decisions</text>
  <text x="635" y="198" text-anchor="middle" font-size="11" fill="#065f46">✅ Design patterns</text>
  <text x="635" y="216" text-anchor="middle" font-size="11" fill="#065f46">✅ Performance concerns</text>

  <!-- Bottom -->
  <rect x="150" y="275" width="500" height="30" rx="8" fill="#16a34a"/>
  <text x="400" y="295" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Mechanical checks done by agent · Expert thinking done by human</text>
</svg>

