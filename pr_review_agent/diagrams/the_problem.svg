<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Arial, sans-serif">
  <rect width="900" height="480" fill="#fef2f2" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#991b1b">The Problem: Manual Code Review</text>

  <!-- Timeline -->
  <rect x="50" y="60" width="800" height="80" rx="10" fill="#fff" stroke="#fca5a5" stroke-width="1"/>
  <text x="450" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">Typical PR Review Timeline</text>
  <rect x="70" y="95" width="120" height="30" rx="5" fill="#fee2e2"/>
  <text x="130" y="115" text-anchor="middle" font-size="10" fill="#991b1b">PR submitted</text>
  <rect x="220" y="95" width="180" height="30" rx="5" fill="#fecaca"/>
  <text x="310" y="115" text-anchor="middle" font-size="10" fill="#991b1b">⏳ Wait hours/days</text>
  <rect x="430" y="95" width="140" height="30" rx="5" fill="#fee2e2"/>
  <text x="500" y="115" text-anchor="middle" font-size="10" fill="#991b1b">Review round 1</text>
  <rect x="600" y="95" width="100" height="30" rx="5" fill="#fee2e2"/>
  <text x="650" y="115" text-anchor="middle" font-size="10" fill="#991b1b">Fix & push</text>
  <rect x="730" y="95" width="100" height="30" rx="5" fill="#fee2e2"/>
  <text x="780" y="115" text-anchor="middle" font-size="10" fill="#991b1b">Round 2-3</text>

  <!-- What reviewers check -->
  <rect x="50" y="160" width="400" height="240" rx="10" fill="#fff" stroke="#fca5a5" stroke-width="1"/>
  <text x="250" y="185" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b">What Reviewers Check Manually</text>

  <text x="70" y="210" font-size="11" fill="#991b1b">☐ License header on new files</text>
  <text x="70" y="232" font-size="11" fill="#991b1b">☐ No System.out.println</text>
  <text x="70" y="254" font-size="11" fill="#991b1b">☐ No @Autowired on fields</text>
  <text x="70" y="276" font-size="11" fill="#991b1b">☐ @PreAuthorize on write endpoints</text>
  <text x="70" y="298" font-size="11" fill="#991b1b">☐ @Operation on all endpoints</text>
  <text x="70" y="320" font-size="11" fill="#991b1b">☐ Thrift null-safety</text>
  <text x="70" y="342" font-size="11" fill="#991b1b">☐ Test calls TestRestTemplate</text>
  <text x="70" y="364" font-size="11" fill="#991b1b">☐ Exception pattern correct</text>
  <text x="70" y="386" font-size="11" fill="#991b1b">☐ Jackson mixin updated</text>

  <!-- Pain points -->
  <rect x="480" y="160" width="370" height="240" rx="10" fill="#fff" stroke="#fca5a5" stroke-width="1"/>
  <text x="665" y="185" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b">Pain Points</text>

  <rect x="500" y="200" width="330" height="35" rx="5" fill="#fee2e2"/>
  <text x="510" y="222" font-size="11" fill="#991b1b">😤 60% of comments are mechanical patterns</text>

  <rect x="500" y="245" width="330" height="35" rx="5" fill="#fee2e2"/>
  <text x="510" y="267" font-size="11" fill="#991b1b">🔁 2.5 review rounds average per PR</text>

  <rect x="500" y="290" width="330" height="35" rx="5" fill="#fee2e2"/>
  <text x="510" y="312" font-size="11" fill="#991b1b">⏱️ Hours to days for first feedback</text>

  <rect x="500" y="335" width="330" height="35" rx="5" fill="#fee2e2"/>
  <text x="510" y="357" font-size="11" fill="#991b1b">🎲 Inconsistent — depends on who reviews</text>

  <rect x="500" y="380" width="330" height="35" rx="5" fill="#fee2e2"/>
  <text x="510" y="402" font-size="11" fill="#991b1b">🆕 New contributors fail 3–4 times</text>

  <!-- Bottom -->
  <rect x="150" y="425" width="600" height="40" rx="8" fill="#dc2626"/>
  <text x="450" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Result: Reviewers spend 5+ hours/week on repetitive pattern checks</text>
  <text x="450" y="460" text-anchor="middle" font-size="10" fill="#fecaca">No time left for business logic review</text>
</svg>

