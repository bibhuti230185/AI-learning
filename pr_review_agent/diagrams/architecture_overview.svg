<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Arial, sans-serif">
  <rect width="900" height="420" fill="#f8fafc" rx="12"/>
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Architecture Overview — Two-Layer Review System</text>

  <!-- GitHub PR trigger -->
  <rect x="30" y="170" width="130" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="95" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#e2e8f0">GitHub PR</text>
  <text x="95" y="213" text-anchor="middle" font-size="10" fill="#94a3b8">push event</text>

  <path d="M 160 200 L 200 200" stroke="#64748b" stroke-width="2" marker-end="url(#ra1)"/>
  <defs><marker id="ra1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#64748b"/></marker></defs>

  <!-- Webhook handler -->
  <rect x="200" y="170" width="130" height="60" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="265" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">Webhook</text>
  <text x="265" y="213" text-anchor="middle" font-size="10" fill="#6b21a8">Parse diff</text>

  <!-- Split into two layers -->
  <path d="M 330 180 L 390 120" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ra1)"/>
  <path d="M 330 220 L 390 280" stroke="#059669" stroke-width="1.5" marker-end="url(#ra1)"/>

  <!-- Layer 1 -->
  <rect x="390" y="80" width="250" height="80" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="515" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">⚡ Layer 1 — Deterministic</text>
  <text x="515" y="125" text-anchor="middle" font-size="10" fill="#991b1b">R01-R08: regex/grep rules</text>
  <text x="515" y="142" text-anchor="middle" font-size="10" fill="#991b1b">&lt;10 sec · No LLM · $0 cost</text>

  <!-- Layer 2 -->
  <rect x="390" y="240" width="250" height="100" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="515" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">🧠 Layer 2 — RAG Deep</text>
  <text x="515" y="285" text-anchor="middle" font-size="10" fill="#065f46">L01-L06: contextual checks</text>
  <text x="515" y="305" text-anchor="middle" font-size="10" fill="#065f46">Vector store retrieval + LLM</text>
  <text x="515" y="322" text-anchor="middle" font-size="10" fill="#065f46">30-60 sec · ~$0.05/PR</text>

  <!-- Vector store connected to Layer 2 -->
  <rect x="390" y="360" width="120" height="45" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="450" y="382" text-anchor="middle" font-size="10" font-weight="bold" fill="#5b21b6">📚 Vector Store</text>
  <text x="450" y="397" text-anchor="middle" font-size="9" fill="#6b21a8">Code patterns</text>
  <path d="M 450 340 L 450 360" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3"/>

  <!-- Merge -->
  <path d="M 640 120 L 690 180" stroke="#dc2626" stroke-width="1.5"/>
  <path d="M 640 290 L 690 220" stroke="#059669" stroke-width="1.5"/>

  <!-- Post review -->
  <rect x="680" y="170" width="180" height="60" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="770" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#9a3412">📝 Post Review</text>
  <text x="770" y="215" text-anchor="middle" font-size="10" fill="#9a3412">Merge + deduplicate + post</text>

  <!-- Output -->
  <path d="M 770 230 L 770 260" stroke="#ea580c" stroke-width="1.5" marker-end="url(#ra1)"/>
  <rect x="690" y="260" width="180" height="50" rx="8" fill="#fff" stroke="#16a34a" stroke-width="2"/>
  <text x="780" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">GitHub PR Review</text>
  <text x="780" y="300" text-anchor="middle" font-size="10" fill="#166534">Inline comments + verdict</text>

  <!-- Feedback loop -->
  <rect x="700" y="330" width="160" height="45" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="780" y="352" text-anchor="middle" font-size="10" font-weight="bold" fill="#075985">🔄 Feedback Loop</text>
  <text x="780" y="368" text-anchor="middle" font-size="9" fill="#075985">👍/👎 → adjust rules</text>
  <path d="M 780 310 L 780 330" stroke="#0284c7" stroke-width="1" stroke-dasharray="3"/>
</svg>

