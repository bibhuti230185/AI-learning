<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Arial, sans-serif">
  <rect width="900" height="500" fill="#f8fafc" rx="12"/>

  <!-- Center node -->
  <rect x="340" y="210" width="220" height="60" rx="30" fill="#7c3aed" stroke="#6d28d9" stroke-width="2"/>
  <text x="450" y="247" text-anchor="middle" fill="white" font-size="16" font-weight="bold">PR Review Agent</text>

  <!-- Branch 1: Trigger -->
  <line x1="340" y1="230" x2="140" y2="100" stroke="#2563eb" stroke-width="2"/>
  <rect x="40" y="75" width="200" height="50" rx="25" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="140" y="105" text-anchor="middle" fill="#1d4ed8" font-size="13" font-weight="bold">Trigger</text>
  <text x="140" y="145" text-anchor="middle" fill="#1d4ed8" font-size="11">PR push → webhook → auto-run</text>

  <!-- Branch 2: Layer 1 -->
  <line x1="340" y1="250" x2="120" y2="340" stroke="#dc2626" stroke-width="2"/>
  <rect x="20" y="315" width="200" height="50" rx="25" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="120" y="345" text-anchor="middle" fill="#991b1b" font-size="13" font-weight="bold">Layer 1: Deterministic</text>
  <text x="120" y="385" text-anchor="middle" fill="#991b1b" font-size="11">Regex rules · &lt;10s · $0 cost</text>

  <!-- Branch 3: Layer 2 -->
  <line x1="450" y1="210" x2="450" y2="80" stroke="#059669" stroke-width="2"/>
  <rect x="350" y="40" width="200" height="50" rx="25" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="450" y="70" text-anchor="middle" fill="#065f46" font-size="13" font-weight="bold">Layer 2: RAG Deep Review</text>
  <text x="450" y="20" text-anchor="middle" fill="#065f46" font-size="11">LLM + codebase context · ~$0.05</text>

  <!-- Branch 4: Output -->
  <line x1="560" y1="230" x2="750" y2="120" stroke="#ea580c" stroke-width="2"/>
  <rect x="650" y="95" width="220" height="50" rx="25" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
  <text x="760" y="125" text-anchor="middle" fill="#9a3412" font-size="13" font-weight="bold">Inline Review Comments</text>
  <text x="760" y="165" text-anchor="middle" fill="#9a3412" font-size="11">With fix suggestions + references</text>

  <!-- Branch 5: Feedback -->
  <line x1="560" y1="250" x2="750" y2="340" stroke="#0284c7" stroke-width="2"/>
  <rect x="650" y="315" width="200" height="50" rx="25" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="750" y="345" text-anchor="middle" fill="#075985" font-size="13" font-weight="bold">Feedback Loop</text>
  <text x="750" y="385" text-anchor="middle" fill="#075985" font-size="11">👍/👎 reactions → improve rules</text>

  <!-- Branch 6: Human Focus -->
  <line x1="450" y1="270" x2="450" y2="420" stroke="#ca8a04" stroke-width="2"/>
  <rect x="310" y="400" width="280" height="50" rx="25" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="450" y="430" text-anchor="middle" fill="#854d0e" font-size="13" font-weight="bold">Human Reviews Logic Only</text>
  <text x="450" y="470" text-anchor="middle" fill="#854d0e" font-size="11">Mechanical checks already done</text>
</svg>

