<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Arial, sans-serif">
  <rect width="800" height="450" fill="#fef2f2" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#991b1b">❌ BEFORE — Manual Review Process (Today)</text>

  <!-- Steps -->
  <rect x="200" y="50" width="400" height="45" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">Step 1: PR lands → wait hours/days</text>
  <text x="400" y="88" text-anchor="middle" font-size="10" fill="#666">Developer context-switches away</text>

  <line x1="400" y1="95" x2="400" y2="108" stroke="#ef4444" stroke-width="1.5"/>

  <rect x="200" y="108" width="400" height="45" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">Step 2: Reviewer checks every pattern manually</text>
  <text x="400" y="146" text-anchor="middle" font-size="10" fill="#666">Headers, annotations, null-checks, tests...</text>

  <line x1="400" y1="153" x2="400" y2="166" stroke="#ef4444" stroke-width="1.5"/>

  <rect x="200" y="166" width="400" height="45" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">Step 3: Reviewer writes same comments (again)</text>
  <text x="400" y="204" text-anchor="middle" font-size="10" fill="#666">"Missing @PreAuthorize" — written 50 times before</text>

  <line x1="400" y1="211" x2="400" y2="224" stroke="#ef4444" stroke-width="1.5"/>

  <rect x="200" y="224" width="400" height="45" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="246" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">Step 4: Author fixes → pushes → waits again</text>
  <text x="400" y="262" text-anchor="middle" font-size="10" fill="#666">Another round of context-switching</text>

  <line x1="400" y1="269" x2="400" y2="282" stroke="#ef4444" stroke-width="1.5"/>

  <rect x="200" y="282" width="400" height="45" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="304" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">Step 5: Repeat 2-3 times → finally merge</text>
  <text x="400" y="320" text-anchor="middle" font-size="10" fill="#666">~3 days total from PR to merge</text>

  <!-- Stats on right -->
  <rect x="630" y="100" width="150" height="60" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="705" y="125" text-anchor="middle" font-size="18" font-weight="bold" fill="#991b1b">60%</text>
  <text x="705" y="148" text-anchor="middle" font-size="10" fill="#991b1b">comments = mechanical</text>

  <rect x="630" y="180" width="150" height="60" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="705" y="205" text-anchor="middle" font-size="18" font-weight="bold" fill="#991b1b">2.5 rounds</text>
  <text x="705" y="228" text-anchor="middle" font-size="10" fill="#991b1b">avg per PR</text>

  <rect x="630" y="260" width="150" height="60" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="705" y="285" text-anchor="middle" font-size="18" font-weight="bold" fill="#991b1b">5+ hrs/wk</text>
  <text x="705" y="308" text-anchor="middle" font-size="10" fill="#991b1b">on pattern checks</text>

  <!-- Bottom -->
  <rect x="100" y="360" width="600" height="70" rx="10" fill="#dc2626"/>
  <text x="400" y="388" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Result: Slow merges, reviewer fatigue, inconsistent quality</text>
  <text x="400" y="410" text-anchor="middle" font-size="11" fill="#fecaca">Reviewers spend time on patterns instead of logic</text>
  <text x="400" y="425" text-anchor="middle" font-size="11" fill="#fecaca">New contributors face high friction</text>
</svg>

