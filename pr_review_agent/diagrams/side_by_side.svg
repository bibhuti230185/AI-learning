<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#f8fafc" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#334155">📊 Side-by-Side: Manual Review vs. Agent Review</text>

  <!-- Left: Manual -->
  <rect x="30" y="50" width="360" height="310" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="210" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#dc2626">❌ Manual Review</text>

  <rect x="50" y="90" width="320" height="28" rx="5" fill="#fee2e2"/>
  <text x="60" y="109" font-size="11" fill="#991b1b">⏳ Wait hours/days for reviewer</text>
  <rect x="50" y="123" width="320" height="28" rx="5" fill="#fee2e2"/>
  <text x="60" y="142" font-size="11" fill="#991b1b">👁️ Reviewer manually checks patterns</text>
  <rect x="50" y="156" width="320" height="28" rx="5" fill="#fee2e2"/>
  <text x="60" y="175" font-size="11" fill="#991b1b">✍️ Writes same comments (again)</text>
  <rect x="50" y="189" width="320" height="28" rx="5" fill="#fee2e2"/>
  <text x="60" y="208" font-size="11" fill="#991b1b">🔁 Author fixes → re-review → repeat</text>
  <rect x="50" y="222" width="320" height="28" rx="5" fill="#fee2e2"/>
  <text x="60" y="241" font-size="11" fill="#991b1b">🎲 Different reviewers catch different things</text>
  <rect x="50" y="255" width="320" height="28" rx="5" fill="#fee2e2"/>
  <text x="60" y="274" font-size="11" fill="#991b1b">📅 ~3 days from PR to merge</text>

  <rect x="50" y="300" width="320" height="45" rx="6" fill="#dc2626"/>
  <text x="210" y="320" text-anchor="middle" font-size="11" font-weight="bold" fill="white">⏱️ 2.5 review rounds · 5+ hrs/week</text>
  <text x="210" y="338" text-anchor="middle" font-size="10" fill="#fecaca">Reviewer time wasted on patterns</text>

  <!-- Right: Agent -->
  <rect x="410" y="50" width="360" height="310" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="590" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#16a34a">✅ With Agent</text>

  <rect x="430" y="90" width="320" height="28" rx="5" fill="#dcfce7"/>
  <text x="440" y="109" font-size="11" fill="#166534">⚡ Feedback in &lt;60 seconds</text>
  <rect x="430" y="123" width="320" height="28" rx="5" fill="#dcfce7"/>
  <text x="440" y="142" font-size="11" fill="#166534">🤖 All patterns checked automatically</text>
  <rect x="430" y="156" width="320" height="28" rx="5" fill="#dcfce7"/>
  <text x="440" y="175" font-size="11" fill="#166534">💡 Fix suggestions with code examples</text>
  <rect x="430" y="189" width="320" height="28" rx="5" fill="#dcfce7"/>
  <text x="440" y="208" font-size="11" fill="#166534">👤 Human reviews logic only</text>
  <rect x="430" y="222" width="320" height="28" rx="5" fill="#dcfce7"/>
  <text x="440" y="241" font-size="11" fill="#166534">📏 Same rules every time, every PR</text>
  <rect x="430" y="255" width="320" height="28" rx="5" fill="#dcfce7"/>
  <text x="440" y="274" font-size="11" fill="#166534">📅 ~1 day from PR to merge</text>

  <rect x="430" y="300" width="320" height="45" rx="6" fill="#16a34a"/>
  <text x="590" y="320" text-anchor="middle" font-size="11" font-weight="bold" fill="white">⏱️ 1 review round · 0 hrs/week on patterns</text>
  <text x="590" y="338" text-anchor="middle" font-size="10" fill="#bbf7d0">Reviewer focuses on high-value logic</text>
</svg>

