<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="500" fill="#f8fafc" rx="12"/>

  <!-- Center node -->
  <rect x="320" y="210" width="260" height="60" rx="30" fill="#2563eb" stroke="#1d4ed8" stroke-width="2"/>
  <text x="450" y="247" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Endpoint Scaffolding Agent</text>

  <!-- Branch 1: Input -->
  <line x1="320" y1="230" x2="140" y2="120" stroke="#059669" stroke-width="2"/>
  <rect x="40" y="95" width="200" height="50" rx="25" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="140" y="125" text-anchor="middle" fill="#065f46" font-size="13" font-weight="bold">Input</text>
  <text x="140" y="165" text-anchor="middle" fill="#065f46" font-size="11">/scaffold GET /path "desc"</text>

  <!-- Branch 2: RAG Retrieval -->
  <line x1="320" y1="250" x2="120" y2="310" stroke="#7c3aed" stroke-width="2"/>
  <rect x="20" y="285" width="200" height="50" rx="25" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="120" y="315" text-anchor="middle" fill="#5b21b6" font-size="13" font-weight="bold">RAG Retrieval</text>
  <text x="120" y="355" text-anchor="middle" fill="#5b21b6" font-size="11">Vector Store → Similar Patterns</text>

  <!-- Branch 3: Code Generation -->
  <line x1="450" y1="210" x2="450" y2="80" stroke="#dc2626" stroke-width="2"/>
  <rect x="350" y="40" width="200" height="50" rx="25" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="450" y="70" text-anchor="middle" fill="#991b1b" font-size="13" font-weight="bold">Code Generation</text>
  <text x="450" y="20" text-anchor="middle" fill="#991b1b" font-size="11">Controller + Service + Test</text>

  <!-- Branch 4: Validation -->
  <line x1="580" y1="230" x2="750" y2="120" stroke="#ea580c" stroke-width="2"/>
  <rect x="650" y="95" width="210" height="50" rx="25" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
  <text x="755" y="125" text-anchor="middle" fill="#9a3412" font-size="13" font-weight="bold">Validation Loop</text>
  <text x="755" y="165" text-anchor="middle" fill="#9a3412" font-size="11">Annotations + Compile + ArchUnit</text>

  <!-- Branch 5: Output -->
  <line x1="580" y1="250" x2="750" y2="310" stroke="#0284c7" stroke-width="2"/>
  <rect x="650" y="285" width="200" height="50" rx="25" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="750" y="315" text-anchor="middle" fill="#075985" font-size="13" font-weight="bold">Output</text>
  <text x="750" y="355" text-anchor="middle" fill="#075985" font-size="11">PR or IDE Workspace Edits</text>

  <!-- Branch 6: Grounding -->
  <line x1="450" y1="270" x2="450" y2="400" stroke="#ca8a04" stroke-width="2"/>
  <rect x="330" y="390" width="240" height="50" rx="25" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="450" y="420" text-anchor="middle" fill="#854d0e" font-size="13" font-weight="bold">Grounded in Real Codebase</text>
  <text x="450" y="460" text-anchor="middle" fill="#854d0e" font-size="11">No hallucination — only real patterns</text>
</svg>

