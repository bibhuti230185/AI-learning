<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial, sans-serif">
  <rect width="800" height="400" fill="#f0fdf4" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#166534">✅ AFTER — With the Scaffolding Agent</text>

  <!-- Single command input -->
  <rect x="150" y="55" width="500" height="50" rx="8" fill="#1e293b" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="82" text-anchor="middle" font-size="13" fill="#4ade80" font-family="monospace">/scaffold GET /api/packages/{id}/vulnerabilities "desc"</text>
  <text x="400" y="98" text-anchor="middle" font-size="10" fill="#86efac">← One command. That's it.</text>

  <!-- Agent processing -->
  <line x1="400" y1="105" x2="400" y2="125" stroke="#16a34a" stroke-width="2"/>

  <rect x="200" y="125" width="400" height="160" rx="10" fill="#fff" stroke="#16a34a" stroke-width="2"/>
  <text x="400" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">🤖 Agent processes automatically</text>

  <text x="230" y="175" font-size="11" fill="#166534">1. Retrieves similar endpoints from vector store</text>
  <text x="230" y="195" font-size="11" fill="#166534">2. Generates Controller + Service + Test</text>
  <text x="230" y="215" font-size="11" fill="#166534">3. Validates annotations, ArchUnit rules, compile</text>
  <text x="230" y="235" font-size="11" fill="#166534">4. Auto-fixes if validation fails (up to 3 retries)</text>
  <text x="230" y="255" font-size="11" fill="#166534">5. Creates PR with all changes</text>

  <!-- Time indicator -->
  <rect x="620" y="155" width="140" height="70" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="690" y="185" text-anchor="middle" font-size="24" font-weight="bold" fill="#166534">&lt; 2 min</text>
  <text x="690" y="210" text-anchor="middle" font-size="11" fill="#166534">total time</text>

  <!-- Output -->
  <line x1="400" y1="285" x2="400" y2="305" stroke="#16a34a" stroke-width="2"/>

  <rect x="100" y="305" width="180" height="60" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="190" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">✅ Controller.java</text>
  <text x="190" y="350" text-anchor="middle" font-size="10" fill="#166534">All annotations correct</text>

  <rect x="310" y="305" width="180" height="60" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="400" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">✅ Service.java</text>
  <text x="400" y="350" text-anchor="middle" font-size="10" fill="#166534">Error handling correct</text>

  <rect x="520" y="305" width="180" height="60" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="610" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">✅ Test.java</text>
  <text x="610" y="350" text-anchor="middle" font-size="10" fill="#166534">HTTP call included</text>

  <!-- Bottom -->
  <rect x="150" y="380" width="500" height="30" rx="6" fill="#16a34a"/>
  <text x="400" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Developer reviews output → submits PR → done ✓</text>
</svg>

