<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Arial, sans-serif">
  <rect width="800" height="520" fill="#fef2f2" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#991b1b">❌ BEFORE — Manual Workflow (Today)</text>

  <!-- Step boxes connected vertically -->
  <rect x="250" y="50" width="300" height="50" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">Step 1: Open Controller</text>
  <text x="400" y="89" text-anchor="middle" font-size="10" fill="#666">Write @Operation, @ApiResponse, @GetMapping</text>

  <line x1="400" y1="100" x2="400" y2="115" stroke="#ef4444" stroke-width="1.5"/>

  <rect x="250" y="115" width="300" height="50" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="137" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">Step 2: Open Service</text>
  <text x="400" y="154" text-anchor="middle" font-size="10" fill="#666">Write ThriftClient call + exception handling</text>

  <line x1="400" y1="165" x2="400" y2="180" stroke="#ef4444" stroke-width="1.5"/>

  <rect x="250" y="180" width="300" height="50" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="202" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">Step 3: Open Test</text>
  <text x="400" y="219" text-anchor="middle" font-size="10" fill="#666">Write TestRestTemplate.exchange() call</text>

  <line x1="400" y1="230" x2="400" y2="245" stroke="#ef4444" stroke-width="1.5"/>

  <rect x="250" y="245" width="300" height="50" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="267" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">Step 4: JacksonCustomizations</text>
  <text x="400" y="284" text-anchor="middle" font-size="10" fill="#666">Mixin + ObjectMapper + SpringDocUtils</text>

  <line x1="400" y1="295" x2="400" y2="310" stroke="#ef4444" stroke-width="1.5"/>

  <rect x="250" y="310" width="300" height="50" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">Step 5: AsciiDoc</text>
  <text x="400" y="349" text-anchor="middle" font-size="10" fill="#666">Document endpoint for REST docs</text>

  <line x1="400" y1="360" x2="400" y2="375" stroke="#ef4444" stroke-width="1.5"/>

  <rect x="250" y="375" width="300" height="50" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="397" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">Step 6: mvn compile → fix → repeat</text>
  <text x="400" y="414" text-anchor="middle" font-size="10" fill="#666">CI failure loop until patterns correct</text>

  <!-- Time indicator -->
  <rect x="600" y="180" width="160" height="100" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="680" y="210" text-anchor="middle" font-size="24" font-weight="bold" fill="#991b1b">60–140</text>
  <text x="680" y="235" text-anchor="middle" font-size="14" fill="#991b1b">minutes</text>
  <text x="680" y="260" text-anchor="middle" font-size="11" fill="#991b1b">per endpoint</text>

  <!-- Review rounds -->
  <rect x="600" y="310" width="160" height="60" rx="8" fill="#fee2e2" stroke="#dc2626"/>
  <text x="680" y="338" text-anchor="middle" font-size="20" font-weight="bold" fill="#991b1b">2–3 rounds</text>
  <text x="680" y="358" text-anchor="middle" font-size="11" fill="#991b1b">review cycles</text>

  <!-- Bottom summary -->
  <rect x="150" y="450" width="500" height="50" rx="10" fill="#dc2626"/>
  <text x="400" y="472" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Result: High effort, inconsistency, CI failures, slow merges</text>
  <text x="400" y="490" text-anchor="middle" font-size="11" fill="#fecaca">Developer spends most time on boilerplate, not business logic</text>
</svg>

