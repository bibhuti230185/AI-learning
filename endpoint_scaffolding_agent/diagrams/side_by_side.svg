<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="Arial, sans-serif">
  <rect width="800" height="380" fill="#f8fafc" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#334155">📊 Side-by-Side Comparison</text>

  <!-- Left: Manual -->
  <rect x="30" y="50" width="360" height="310" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="210" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#dc2626">❌ Manual Today</text>

  <rect x="50" y="90" width="320" height="30" rx="5" fill="#fee2e2"/>
  <text x="60" y="110" font-size="11" fill="#991b1b">1. Open Controller → write method</text>
  <rect x="50" y="125" width="320" height="30" rx="5" fill="#fee2e2"/>
  <text x="60" y="145" font-size="11" fill="#991b1b">2. Open Service → write Thrift call</text>
  <rect x="50" y="160" width="320" height="30" rx="5" fill="#fee2e2"/>
  <text x="60" y="180" font-size="11" fill="#991b1b">3. Open Test → write HTTP test</text>
  <rect x="50" y="195" width="320" height="30" rx="5" fill="#fee2e2"/>
  <text x="60" y="215" font-size="11" fill="#991b1b">4. Update JacksonCustomizations</text>
  <rect x="50" y="230" width="320" height="30" rx="5" fill="#fee2e2"/>
  <text x="60" y="250" font-size="11" fill="#991b1b">5. Write AsciiDoc</text>
  <rect x="50" y="265" width="320" height="30" rx="5" fill="#fee2e2"/>
  <text x="60" y="285" font-size="11" fill="#991b1b">6. Compile → fix → repeat → PR → review loops</text>

  <rect x="50" y="310" width="320" height="35" rx="6" fill="#dc2626"/>
  <text x="210" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="white">⏱️ 60–140 min · 2–3 review rounds</text>

  <!-- Right: Agent -->
  <rect x="410" y="50" width="360" height="310" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="590" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#16a34a">✅ With Agent</text>

  <rect x="430" y="90" width="320" height="50" rx="5" fill="#dcfce7"/>
  <text x="440" y="112" font-size="11" fill="#166534">1. /scaffold GET /api/packages/{id}/vulns</text>
  <text x="440" y="130" font-size="10" fill="#166534" font-style="italic">   Agent does everything else automatically</text>

  <rect x="430" y="150" width="320" height="30" rx="5" fill="#dcfce7"/>
  <text x="440" y="170" font-size="11" fill="#166534">2. Review generated code</text>

  <rect x="430" y="190" width="320" height="30" rx="5" fill="#dcfce7"/>
  <text x="440" y="210" font-size="11" fill="#166534">3. Submit PR ✓</text>

  <rect x="430" y="250" width="320" height="35" rx="6" fill="#bbf7d0"/>
  <text x="590" y="272" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">All patterns guaranteed correct</text>

  <rect x="430" y="310" width="320" height="35" rx="6" fill="#16a34a"/>
  <text x="590" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="white">⏱️ &lt; 2 min · 0–1 review rounds</text>
</svg>

