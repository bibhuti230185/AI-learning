<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Arial, sans-serif">
  <rect width="800" height="400" fill="#f8fafc" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">What the Agent Does — Block View</text>

  <!-- Step 1: PARSE -->
  <rect x="30" y="60" width="140" height="90" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="100" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">1. PARSE</text>
  <text x="100" y="105" text-anchor="middle" font-size="10" fill="#1e40af">Entity: Package</text>
  <text x="100" y="120" text-anchor="middle" font-size="10" fill="#1e40af">Method: GET</text>
  <text x="100" y="135" text-anchor="middle" font-size="10" fill="#1e40af">Path: /{id}/vulns</text>

  <path d="M 170 105 L 200 105" stroke="#64748b" stroke-width="1.5" marker-end="url(#ba1)"/>
  <defs><marker id="ba1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#64748b"/></marker></defs>

  <!-- Step 2: RETRIEVE -->
  <rect x="200" y="60" width="155" height="90" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="277" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b21b6">2. RETRIEVE</text>
  <text x="277" y="105" text-anchor="middle" font-size="10" fill="#6b21a8">Similar controllers</text>
  <text x="277" y="120" text-anchor="middle" font-size="10" fill="#6b21a8">Thrift methods</text>
  <text x="277" y="135" text-anchor="middle" font-size="10" fill="#6b21a8">Test patterns</text>

  <path d="M 355 105 L 385 105" stroke="#64748b" stroke-width="1.5" marker-end="url(#ba1)"/>

  <!-- Step 3: GENERATE -->
  <rect x="385" y="60" width="155" height="90" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="462" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">3. GENERATE</text>
  <text x="462" y="105" text-anchor="middle" font-size="10" fill="#92400e">Controller method</text>
  <text x="462" y="120" text-anchor="middle" font-size="10" fill="#92400e">Service method</text>
  <text x="462" y="135" text-anchor="middle" font-size="10" fill="#92400e">Test method</text>

  <path d="M 540 105 L 570 105" stroke="#64748b" stroke-width="1.5" marker-end="url(#ba1)"/>

  <!-- Step 4: VALIDATE -->
  <rect x="570" y="60" width="155" height="90" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="647" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">4. VALIDATE</text>
  <text x="647" y="105" text-anchor="middle" font-size="10" fill="#065f46">✓ Annotations</text>
  <text x="647" y="120" text-anchor="middle" font-size="10" fill="#065f46">✓ HTTP test call</text>
  <text x="647" y="135" text-anchor="middle" font-size="10" fill="#065f46">✓ mvn compile</text>

  <!-- Step 5: OUTPUT -->
  <path d="M 647 150 L 647 180" stroke="#64748b" stroke-width="1.5" marker-end="url(#ba1)"/>
  <rect x="570" y="180" width="155" height="50" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="647" y="205" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">5. OUTPUT</text>
  <text x="647" y="222" text-anchor="middle" font-size="10" fill="#166534">PR or IDE edits</text>

  <!-- Retry arrow -->
  <path d="M 570 150 C 540 170 420 170 420 150" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4" fill="none" marker-end="url(#ba2)"/>
  <text x="490" y="175" text-anchor="middle" font-size="9" fill="#dc2626">retry (max 3)</text>
  <defs><marker id="ba2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#dc2626"/></marker></defs>

  <!-- Bottom: What each step uses -->
  <rect x="30" y="260" width="740" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="285" text-anchor="middle" font-size="13" font-weight="bold" fill="#334155">What Powers Each Step</text>

  <rect x="50" y="300" width="160" height="60" rx="6" fill="#dbeafe"/>
  <text x="130" y="320" text-anchor="middle" font-size="10" font-weight="bold" fill="#1d4ed8">PARSE</text>
  <text x="130" y="340" text-anchor="middle" font-size="9" fill="#1e40af">Regex + entity lookup</text>
  <text x="130" y="352" text-anchor="middle" font-size="9" fill="#1e40af">from slash command</text>

  <rect x="230" y="300" width="160" height="60" rx="6" fill="#ede9fe"/>
  <text x="310" y="320" text-anchor="middle" font-size="10" font-weight="bold" fill="#5b21b6">RETRIEVE</text>
  <text x="310" y="340" text-anchor="middle" font-size="9" fill="#6b21a8">Vector store similarity</text>
  <text x="310" y="352" text-anchor="middle" font-size="9" fill="#6b21a8">Semantic + BM25 hybrid</text>

  <rect x="410" y="300" width="160" height="60" rx="6" fill="#fef3c7"/>
  <text x="490" y="320" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">GENERATE</text>
  <text x="490" y="340" text-anchor="middle" font-size="9" fill="#92400e">GPT-4o with retrieved</text>
  <text x="490" y="352" text-anchor="middle" font-size="9" fill="#92400e">patterns as context</text>

  <rect x="590" y="300" width="160" height="60" rx="6" fill="#d1fae5"/>
  <text x="670" y="320" text-anchor="middle" font-size="10" font-weight="bold" fill="#065f46">VALIDATE</text>
  <text x="670" y="340" text-anchor="middle" font-size="9" fill="#065f46">Deterministic checks +</text>
  <text x="670" y="352" text-anchor="middle" font-size="9" fill="#065f46">mvn compile subprocess</text>
</svg>

